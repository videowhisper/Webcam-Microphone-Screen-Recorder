<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoWhisper Recorder Vanilla Host</title>
  </head>
  <body>
    <div id="recording-field"></div>
    <script type="module">
      import { mount } from "../../packages/recorder-vanilla/src/index.tsx";

      mount({
        target: "#recording-field",
        mode: "video",
        renderMode: "button",
        ui: {
          launchLabel: "Add Video",
          mobileFullscreen: true,
          theme: "auto",
          showLocalSave: true,
          showNevermind: true
        },
        upload: {
          enabled: false,
          fieldName: "media"
        }
      });
    </script>
  </body>
</html>
